"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$python\
$line_break\
$character\
"""

[username]
format = '[$user]($style) '
style_user = 'white'
disabled = false
show_always = true
aliases = { "luizgustavo" = "pam" }

[directory]
style = "#2aa198"

[character]
success_symbol = "[őĽ](#d33682 bold)"
error_symbol = "[őĽ](#dc322f bold)"
vimcmd_symbol = "[őĽ](#859900 bold)"

[git_branch]
format = '[$branch]($style)'
style = "white bold"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](#6c71c4) ($ahead_behind$stashed)]($style)"
style = "#2aa198"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "white"

[cmd_duration]
format = "[$duration]($style) "
style = "#b58900"

[python]
format = "[$virtualenv]($style) "
style = "white"
detect_extensions = []
detect_files = []

